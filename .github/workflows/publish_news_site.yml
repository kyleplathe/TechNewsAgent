# YouTube sync helper for an already-published `/news` episode.
# Daily workflow now handles the post JSON update automatically on email send.
# This workflow only verifies/syncs the YouTube Short into existing `public/news`.
#
# Triggers:
#   - schedule (daily): auto-discovers the Short for today's manifest slug after the
#     user's 8:00 AM Chicago upload deadline. Uses --allow-missing so a not-yet-
#     indexed video doesn't fail the run; the retry loop also waits up to ~15 min.
#   - workflow_dispatch (manual): leave the slug input blank to use the newest
#     manifest slug (post-film flow), or pass YYYY-MM-DD to backfill an older
#     episode (e.g. you uploaded the Short late or replaced it).

name: Publish Tech News to Instakyle

'on':
  schedule:
    # GitHub cron is UTC. 15 13 * * * ≈ 8:15 AM America/Chicago during CDT
    # (≈ 7:15 AM during CST — switch to '15 14 * * *' in winter if you want
    # 8:15 AM local year-round). Runs ~15 min after the 8:00 AM upload deadline
    # to give YouTube time to index the Short for search-by-token.
    - cron: '15 13 * * *'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Episode slug YYYY-MM-DD (America/Chicago). Leave empty to use the newest manifest item.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout agent repo (for scripts)
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout Instakyle
        uses: actions/checkout@v6
        with:
          repository: kyleplathe/Instakyle-clean
          path: instakyle-site
          token: ${{ secrets.INSTAKYLE_PUSH_TOKEN }}

      - name: Resolve episode slug
        id: slug
        env:
          INPUT_SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          MANIFEST="${GITHUB_WORKSPACE}/instakyle-site/public/news/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::manifest.json not found at $MANIFEST"
            exit 1
          fi
          if [ -n "${INPUT_SLUG:-}" ]; then
            if ! echo "$INPUT_SLUG" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "::error::slug input must be YYYY-MM-DD (got: ${INPUT_SLUG})"
              exit 1
            fi
            POST_PATH="${GITHUB_WORKSPACE}/instakyle-site/public/news/posts/${INPUT_SLUG}.json"
            if [ ! -f "$POST_PATH" ]; then
              echo "::error::No post JSON for slug ${INPUT_SLUG} at ${POST_PATH}. Publish that episode first via the daily agent."
              exit 1
            fi
            SLUG="$INPUT_SLUG"
            echo "Using slug from workflow input: ${SLUG}"
          else
            SLUG=$(node -e 'const fs=require("node:fs");const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));const s=m?.items?.[0]?.slug||"";if(!s)process.exit(1);process.stdout.write(String(s));' "$MANIFEST") || true
            if [ -z "$SLUG" ]; then
              echo "::error::Could not resolve slug from manifest first item."
              exit 1
            fi
            echo "Using newest manifest slug: ${SLUG}"
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Verify YouTube and sync episode
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          # On the daily cron we wait longer + tolerate a not-yet-indexed Short so
          # the run doesn't fail if the user uploaded slightly late. Manual
          # dispatches keep stricter defaults so a typo'd slug surfaces as an error.
          IS_SCHEDULE: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: |
          set -e
          SYNC_SLUG="${{ steps.slug.outputs.slug }}"
          ARGS=( --news-dir "${GITHUB_WORKSPACE}/instakyle-site/public/news" --slug "$SYNC_SLUG" )
          if [ -n "${YOUTUBE_CHANNEL_ID}" ]; then
            ARGS+=( --channel-id "${YOUTUBE_CHANNEL_ID}" )
          fi
          if [ "$IS_SCHEDULE" = "true" ]; then
            ARGS+=( --allow-missing )
            export YOUTUBE_DISCOVERY_ATTEMPTS=15
            export YOUTUBE_DISCOVERY_SLEEP_MS=60000
          fi
          npx tsx scripts/youtube-verify-and-sync.ts "${ARGS[@]}"

      - name: Commit and push Instakyle
        working-directory: instakyle-site
        run: |
          set -e
          SLUG="${{ steps.slug.outputs.slug }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "public/news/posts/${SLUG}.json" "public/news/manifest.json"
          if git diff --staged --quiet; then
            echo "No YouTube sync changes to commit."
            exit 0
          fi
          MSG="chore(news): sync YouTube short (${SLUG})"
          git commit -m "$MSG"
          git push origin HEAD
