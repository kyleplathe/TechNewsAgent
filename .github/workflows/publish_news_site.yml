# YouTube sync helper for an already-published `/news` episode.
# Daily workflow now handles the post JSON update automatically on email send.
# This workflow only verifies/syncs the YouTube Short into existing `public/news`.
# Run with no inputs: uses newest manifest slug + auto-discovers the Short by TND-{slug} in the description.

name: Publish Tech News to Instakyle

'on':
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout agent repo (for scripts)
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout Instakyle
        uses: actions/checkout@v6
        with:
          repository: kyleplathe/Instakyle-clean
          path: instakyle-site
          token: ${{ secrets.INSTAKYLE_PUSH_TOKEN }}

      - name: Resolve episode slug
        id: slug
        run: |
          set -euo pipefail
          MANIFEST="${GITHUB_WORKSPACE}/instakyle-site/public/news/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::manifest.json not found at $MANIFEST"
            exit 1
          fi
          SLUG=$(node -e 'const fs=require("node:fs");const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));const s=m?.items?.[0]?.slug||"";if(!s)process.exit(1);process.stdout.write(String(s));' "$MANIFEST") || true
          if [ -z "$SLUG" ]; then
            echo "::error::Could not resolve slug from manifest first item."
            exit 1
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Using newest manifest slug: ${SLUG}"

      - name: Verify YouTube and sync episode
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
        run: |
          set -e
          SYNC_SLUG="${{ steps.slug.outputs.slug }}"
          ARGS=( --news-dir "${GITHUB_WORKSPACE}/instakyle-site/public/news" --slug "$SYNC_SLUG" )
          if [ -n "${YOUTUBE_CHANNEL_ID}" ]; then
            ARGS+=( --channel-id "${YOUTUBE_CHANNEL_ID}" )
          fi
          npx tsx scripts/youtube-verify-and-sync.ts "${ARGS[@]}"

      - name: Commit and push Instakyle
        working-directory: instakyle-site
        run: |
          set -e
          SLUG="${{ steps.slug.outputs.slug }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "public/news/posts/${SLUG}.json" "public/news/manifest.json"
          if git diff --staged --quiet; then
            echo "No YouTube sync changes to commit."
            exit 0
          fi
          MSG="chore(news): sync YouTube short (${SLUG})"
          git commit -m "$MSG"
          git push origin HEAD
