name: Daily Tech News Agent

# Quote `on` so strict YAML parsers don't treat it as boolean true (YAML 1.1)
'on':
  push:
    branches: [main]
  schedule:
    # GitHub cron is UTC only. 0 10 * * * ≈ 5:00 AM America/Chicago during CDT (roughly Mar–Nov).
    # During CST (winter) the same cron is ≈ 4:00 AM Chicago — switch to 0 11 * * * for ~5:00 AM CST (then ~6:00 AM CDT).
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      chicago_date:
        description: 'Episode date YYYY-MM-DD (America/Chicago); leave empty for “today”. Use to backfill posts.'
        required: false
        type: string

# `contents: read` alone makes every other scope `none`, which blocks artifact upload.
permissions:
  contents: read
  actions: write

jobs:
  scrape_and_script:
    runs-on: ubuntu-latest
    # Feeds + Gemini + optional Playwright source grabs
    timeout-minutes: 20
    # Opt into Node 24 for JS-based actions (see GitHub Actions deprecation notice)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout TechNewsAgent
        uses: actions/checkout@v6

      # GitHub rejects `secrets` in step `if:` (invalid workflow). Use env + output instead.
      - name: Detect Instakyle PAT
        id: instakyle_auth
        env:
          INSTAKYLE_PUSH_TOKEN: ${{ secrets.INSTAKYLE_PUSH_TOKEN }}
        run: |
          if [ -n "$INSTAKYLE_PUSH_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      # Fine-grained PAT or classic PAT with repo scope on Instakyle-clean. Omit secret to skip site files + artifact.
      - name: Checkout Instakyle site (manifest seed + /news target)
        id: checkout_instakyle
        if: steps.instakyle_auth.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          repository: kyleplathe/Instakyle-clean
          path: instakyle-site
          token: ${{ secrets.INSTAKYLE_PUSH_TOKEN }}

      - name: Resolve news output directory and publish mode
        id: instakyle_news
        env:
          TOKEN_PRESENT: ${{ secrets.INSTAKYLE_PUSH_TOKEN }}
          PUBLISH_MODE: ${{ vars.NEWS_SITE_PUBLISH_MODE }}
        run: |
          set -e
          MODE="${PUBLISH_MODE:-auto}"
          if [ -z "${TOKEN_PRESENT}" ]; then
            echo "dir=" >> "$GITHUB_OUTPUT"
            echo "push_to_instakyle=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$MODE" = "manual" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/news-staging"
            if [ -f instakyle-site/public/news/manifest.json ]; then
              cp instakyle-site/public/news/manifest.json "${GITHUB_WORKSPACE}/news-staging/manifest.json"
            fi
            echo "dir=${GITHUB_WORKSPACE}/news-staging" >> "$GITHUB_OUTPUT"
            echo "push_to_instakyle=false" >> "$GITHUB_OUTPUT"
            echo "Using NEWS_SITE_PUBLISH_MODE=manual - email + artifact only; run Publish Tech News to Instakyle after you film."
          else
            mkdir -p "${GITHUB_WORKSPACE}/instakyle-site/public/news"
            echo "dir=${GITHUB_WORKSPACE}/instakyle-site/public/news" >> "$GITHUB_OUTPUT"
            echo "push_to_instakyle=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright (Chromium)
        run: npx playwright install-deps chromium && npx playwright install chromium

      - name: Run News Agent
        env:
          # Google AI Studio (free tier): https://aistudio.google.com/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Your real inbox (comma-separated). Required — old default was a placeholder.
          RESEND_TO: ${{ secrets.RESEND_TO }}
          # Optional override, e.g. "Name <noreply@your-verified-domain.com>"
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          # Optional: stories per feed (default 6). Repo variable FEED_ITEM_LIMIT or omit.
          FEED_ITEM_LIMIT: ${{ vars.FEED_ITEM_LIMIT }}
          # Optional: set to 0/false to skip JPEG attachments (saves CI time).
          SCREENSHOT_SOURCES: ${{ vars.SCREENSHOT_SOURCES }}
          # Optional: storefront URL for the day’s local spotlight screenshot + email block (overrides rotation `website` in local_businesses.ts).
          LOCAL_BIZ_WEBSITE: ${{ vars.LOCAL_BIZ_WEBSITE }}
          # After a successful Resend send: writes under this directory (see Resolve step).
          TECHNEWS_INSTAKYLE_NEWS_DIR: ${{ steps.instakyle_news.outputs.dir }}
          TECHNEWS_SITE_ORIGIN: ${{ vars.TECHNEWS_SITE_ORIGIN }}
          TECHNEWS_VIDEO_URL: ${{ secrets.TECHNEWS_VIDEO_URL }}
          # Only set when manually dispatched (empty on schedule / push).
          TECHNEWS_CHICAGO_DATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chicago_date || '' }}
        run: npx tsx tech_news_agent.ts

      - name: Upload news-site-bundle artifact
        if: success() && steps.instakyle_news.outputs.dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: news-site-bundle
          path: ${{ steps.instakyle_news.outputs.dir }}
          if-no-files-found: warn
          retention-days: 5

      - name: Commit and push Instakyle /news (auto mode only)
        if: steps.instakyle_news.outputs.push_to_instakyle == 'true'
        env:
          FORCE_REPUBLISH: ${{ vars.NEWS_SITE_FORCE_REPUBLISH }}
        working-directory: instakyle-site
        run: |
          set -e
          SLUG='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chicago_date || '' }}'
          if [ -z "$SLUG" ] || [ "$SLUG" = "null" ]; then
            SLUG=$(TZ=America/Chicago date +%Y-%m-%d)
          fi
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin "$BRANCH"
          if [ "${FORCE_REPUBLISH}" != "true" ] && git cat-file -e "origin/${BRANCH}:public/news/posts/${SLUG}.json" 2>/dev/null; then
            echo "public/news/posts/${SLUG}.json already exists on origin - skipping push so instakyle.tech/news stays on the first publish for this Chicago date."
            echo "Set repository variable NEWS_SITE_FORCE_REPUBLISH=true to replace, or use workflow_dispatch with a fix."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news
          if git diff --staged --quiet; then
            echo "No changes under public/news."
          else
            git commit -m "chore(news): daily Tech News episode (${SLUG})"
            git push origin HEAD
          fi
