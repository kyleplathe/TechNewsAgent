name: Daily Tech News Agent

# Quote `on` so strict YAML parsers don't treat it as boolean true (YAML 1.1)
'on':
  push:
    branches: [main]
  schedule:
    # UTC-only cron: 11:30 UTC = 6:30 AM Minneapolis during CDT (daylight). During CST (winter), same cron = 5:30 AM local — change to "30 12 * * *" for 6:30 AM in standard time.
    - cron: '30 11 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: read

jobs:
  scrape_and_script:
    runs-on: ubuntu-latest
    # Opt into Node 24 for JS-based actions (see GitHub Actions deprecation notice)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium

      - name: Run News Agent
        env:
          # Google AI Studio (free tier): https://aistudio.google.com/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # If you use Resend to email the script to yourself:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx tech_news_agent.ts
