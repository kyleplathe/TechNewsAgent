name: Daily Tech News Agent

# Quote `on` so strict YAML parsers don't treat it as boolean true (YAML 1.1)
'on':
  push:
    branches: [main]
  schedule:
    # This runs at 13:00 UTC (8:00 AM CST) every day
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: read

jobs:
  scrape_and_script:
    runs-on: ubuntu-latest
    # Opt into Node 24 for JS-based actions (see GitHub Actions deprecation notice)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium

      - name: Run News Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # If you use Resend to email the script to yourself:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx tech_news_agent.ts
